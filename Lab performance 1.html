<!DOCTYPE html>
<html>
<head>
    <title>TechFlow</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 25%;
            background-color: #0a0a0a;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* Hover effect */
        .sidebar a:hover {
            background-color:green;
            padding-left: 15px;
        }

        /* Main area */
        .main {
            width: 75%;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Form box */
        .box {
            background-color: white;
            padding: 30px;
            width: 300px;
            border: 1px solid #ccc;
            display: none;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        /* Login button - Blue */
        .login-btn {
            width: 100%;
            padding: 8px;
            background-color: blue;
            color: white;
            border: none;
        }

        /* Registration button - Green */
        .register-btn {
            width: 100%;
            padding: 8px;
            background-color: green;
            color: white;
            border: none;
        }

        /* Default show registration */
        #registration {
            display: block;
        }

        /* Show login when clicked */
        #login:target {
            display: block;
        }

        /* Hide registration when login is active */
        #login:target ~ #registration {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>TechFlow</h2>
        <a href="#login">Login</a>
        <a href="#registration">Registration</a>
    </div>

    <!-- Main -->
    <div class="main">
        
        <!-- Login Form -->
        <div class="box" id="login">
            <h2>Login</h2>
            <form>
                <label>Email Address</label>
                <input type="email" required>

                <label>Password</label>
                <input type="password" required>

                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>

        <!-- Registration Form -->
        <div class="box" id="registration">
            <h2>Create Account</h2>
            <form>
                <label>Email Address</label>
                <input type="email" required>

                <label>Password</label>
                <input type="password" required>

                <label>Gender</label>
                <select required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

                <button type="submit" class="register-btn">Register</button>
            </form>
        </div>

    </div>

</body>
</html>
